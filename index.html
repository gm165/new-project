<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3i Solution | IT Services & SEO Experts</title>
    <meta name="description" content="Expert IT solution provider. We offer custom web development, SEO, and software services.">
    
    <style>
        /* General Styles */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; line-height: 1.6; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; padding: 20px 5%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .lang-btn { cursor: pointer; background: #007bff; color: white; border: none; padding: 5px 15px; border-radius: 4px; }

        /* Hero Section */
        .hero { padding: 100px 5%; background: #f8f9fa; text-align: center; }
        
        /* Services Grid */
        .services-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 50px 5%; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 10px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #007bff; }

        /* RTL Specific styles */
        [dir="rtl"] .navbar { flex-direction: row-reverse; }
        [dir="rtl"] { text-align: right; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><strong>3i SOLUTION</strong></div>
        <button class="lang-btn" onclick="toggleLanguage()">English / العربية</button>
    </nav>

    <section class="hero">
        <h1 id="title">Empowering Your Digital Future</h1>
        <p id="subtitle">Custom Web Development & SEO Services for Global Businesses.</p>
    </section>

    <section class="services-container">
        <article class="card">
            <h3 id="serv1">Web Development</h3>
            <p id="serv1-desc">Tailored web solutions for your growth.</p>
        </article>
        <article class="card">
            <h3 id="serv2">SEO Strategy</h3>
            <p id="serv2-desc">Get ranked on top with our expert SEO.</p>
        </article>
    </section>

    <script>
        const translations = {
            en: { title: "Empowering Your Digital Future", subtitle: "Custom Web Development & SEO Services.", serv1: "Web Development", serv1Desc: "Tailored web solutions for your growth.", serv2: "SEO Strategy", serv2Desc: "Get ranked on top with our expert SEO." },
            ar: { title: "تمكين مستقبلك الرقمي", subtitle: "تطوير الويب المخصص وخدمات تحسين محركات البحث.", serv1: "تطوير الويب", serv1Desc: "حلول ويب مصممة خصيصًا لنمو أعمالك.", serv2: "استراتيجية تحسين محركات البحث", serv2Desc: "احصل على تصنيف أعلى مع خبراء SEO." }
        };

        function toggleLanguage() {
            const html = document.getElementById('html-root');
            const lang = html.dir === 'rtl' ? 'en' : 'ar';
            html.dir = lang === 'ar' ? 'rtl' : 'ltr';
            html.lang = lang;
            
            // Update text
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('subtitle').innerText = translations[lang].subtitle;
            document.getElementById('serv1').innerText = translations[lang].serv1;
            document.getElementById('serv1-desc').innerText = translations[lang].serv1Desc;
            document.getElementById('serv2').innerText = translations[lang].serv2;
            document.getElementById('serv2-desc').innerText = translations[lang].serv2Desc;
        }
    </script>
</body>
</html>
